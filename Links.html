<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRIT Events</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  height: 100vh;
  overflow-x: hidden;
  color: white;
}

/* ===== LAYER 1: CINEMATIC BACKGROUND ===== */
.background {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at center, #2a0000, #000);
  overflow: hidden;
  z-index: -3;
}

/* PARTICLES */
.particle {
  position: absolute;
  width: 4px;
  height: 4px;
  background: gold;
  border-radius: 50%;
  animation: floatUp linear infinite;
  opacity: 0.8;
}

@keyframes floatUp {
  from {
    transform: translateY(100vh);
    opacity: 0;
  }
  to {
    transform: translateY(-10vh);
    opacity: 1;
  }
}

/* VIGNETTE */
.background::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  box-shadow: inset 0 0 200px rgba(0,0,0,0.9);
}

/* ===== LAYER 2: GLASS OVERLAY ===== */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  backdrop-filter: blur(10px);
  background: rgba(0,0,0,0.4);
  z-index: -2;
}

/* ===== CONTENT ===== */
.container {
  position: relative;
  z-index: 2;
  text-align: center;
  padding: 40px 20px;
}

.logo {
  font-size: 28px;
  font-weight: bold;
  color: gold;
  margin-bottom: 10px;
}

.tagline {
  font-size: 14px;
  margin-bottom: 30px;
  opacity: 0.8;
}

/* ===== BUTTONS ===== */
.link {
  display: block;
  margin: 15px auto;
  padding: 15px;
  max-width: 300px;
  border-radius: 30px;
  background: white;
  color: black;
  text-decoration: none;
  font-weight: bold;
  transition: 0.3s;
}

.link:hover {
  transform: translateY(-3px);
  box-shadow: 0 0 15px gold;
}

/* GOLD BUTTON */
.gold {
  background: gold;
}

/* MOBILE */
@media (max-width: 600px) {
  .logo { font-size: 24px; }
}
</style>
</head>

<body>

<div class="background" id="bg"></div>
<div class="overlay"></div>

<div class="container">
  <div class="logo">GRIT Events</div>
  <div class="tagline">Luxury Event Planning & Design</div>

  <a href="#" class="link gold">Book an Event</a>
  <a href="#" class="link">View Portfolio</a>
  <a href="#" class="link">Our Services</a>
  <a href="#" class="link">Contact Us</a>
</div>

<script>
// CREATE PARTICLES
const bg = document.getElementById("bg");

for (let i = 0; i < 50; i++) {
  let p = document.createElement("div");
  p.classList.add("particle");
  p.style.left = Math.random() * 100 + "vw";
  p.style.animationDuration = (5 + Math.random() * 10) + "s";
  p.style.background = Math.random() > 0.5 ? "gold" : "crimson";
  bg.appendChild(p);
}
</script>

</body>
</html>
